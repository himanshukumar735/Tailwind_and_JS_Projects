<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Practice Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-400 font-sans">

    <div class="container mx-auto p-4 max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">My Expense Tracker</h1>

        <div class="bg-gray-300 rounded-lg shadow-md p-6 mb-6 text-center">
            <h2 class="text-xl text-gray-600 uppercase tracking-wide">Total Spending</h2>
            <p id="totalAmount" class="text-4xl font-bold text-gray-800 mt-2">₹0.00</p>
        </div>

        <div class="bg-gray-400 rounded-lg shadow-md p-6 mb-6">
            <h3 class="text-lg font-semibold mb-4 text-gray-700">Add New Expense</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="descriptionInput" placeholder="Description (e.g. Coffee)"
                    class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

                <input type="number" id="amountInput" placeholder="Amount (e.g. 150)"
                    class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

                <input type="date" id="dateInput"
                    class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

                <select id="categoryInput"
                    class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Rent">Rent</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button id="addBtn"
                class="w-full mt-4 bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition duration-200">
                Add Expense
            </button>
        </div>

        <div class="bg-gray-600 rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold mb-4 text-white">Expense History</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b text-white">
                            <th class="py-2">Date</th>
                            <th class="py-2">Description</th>
                            <th class="py-2">Category</th>
                            <th class="py-2">Amount</th>
                            <th class="py-2">Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
