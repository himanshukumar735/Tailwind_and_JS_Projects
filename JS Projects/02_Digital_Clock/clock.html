<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../dist/style.css">
    <title>Digital Clock | iamhimanshukr</title>
</head>

<body class="bg-slate-500 font-bold flex justify-center items-center h-screen font-mono ">
    <div class="clock-div bg-slate-700 rounded-xl w-80 h-48 ">
        <div>
            <p class=" text-4xl bg-indigo-200 text-indigo-700 p-4 rounded-xl mb-6 text-center">Digital Clock</p>
            <div class="text-4xl mb-6 text-white flex justify-center items-center ">
                <span id="hour" class="tracking-[0.15em]">00 </span> <span class="ml-2">:</span>
                <span id="minute" class="pl-4 tracking-[0.15em]">00 </span> <span class="ml-2">:</span>
                <span id="second" class="pl-4 tracking-[0.15em]">00</span>
                <span id="ampm" class="pl-2 pr-2 tracking-[0.15em] text-xl bg-blue-950 text-white rounded-xl"></span>
            </div>
        </div>
        <div id="date-display" class="text-4xl  text-gray-900 flex justify-center items-center bg-white rounded-xl">
            <span id="date"></span><span class="pl-1 pr-1">-</span>
            <span id="month"></span><span class="pl-1 pr-1">-</span>
            <span id="year"></span><span class="pl-1 pr-1"></span>
            <span id="day" class="bg-blue-600 text-white text-2xl pl-1 pr-1 rounded-xl"></span>
        </div>
    </div>
    <!-- <script src="1_script.js"></script> -->
    <!-- <script src="2_practice_script.js"></script> -->
    <script src="3_production_level.js"></script>
</body>

</html>
