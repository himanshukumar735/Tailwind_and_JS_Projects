<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz app | iamhimanshukr</title>
    <link rel="stylesheet" href="../../dist/style.css">
</head>

<body class="bg-[#282f3b] flex h-screen justify-center items-center font-sans">

    <div class="app bg-slate-800 w-[90%] max-w-[600px] rounded-lg p-8 shadow-2xl">
        <h1 class="text-2xl font-bold border-b border-gray-200 pb-4 text-[#dae3f1]">Simple Quiz</h1>

        <div class="quiz py-5">
            <h2 id="question" class="text-xl font-semibold text-white">Question goes here</h2>

            <div id="answer-buttons" class="py-4">
            </div>

            <button id="next-btn"
                class="bg-[#0c3c89] text-white font-medium w-[150px] border-0 p-2.5 my-5 mx-auto rounded cursor-pointer hidden">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
