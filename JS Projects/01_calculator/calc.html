<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../dist/style.css">
    <title>My Calculator</title>
</head>

<body class="bg-gray-800 h-screen flex items-center justify-center">
    <div class="calculator-body bg-slate-400 w-80 p-6 rounded-3xl shadow-2xl justify-center">
        <input class="display w-full rounded-xl p-4 mb-8 text-right text-3xl" type="text" value="0" readonly
            id="display">
        <div class="button-div grid grid-cols-4">
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4">C</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-semibold mb-4 ml-4">DEL</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">%</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">/</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4">7</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">8</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">9</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">*</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ">4</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">5</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">6</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">-</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4">1</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">2</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">3</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold mb-4 ml-4">+</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold">00</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold ml-4">0</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold ml-4 ">.</button>
            <button class="btn border-2 border-blue-500 rounded-xl text-lg font-bold ml-4">=</button>
        </div>
    </div>
    <!-- <script src="script.js"></script> -->
    <script src="practice_script.js"></script>
</body>

</html>
