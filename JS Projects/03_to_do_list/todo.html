<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../dist/style.css">
    <title>To Do list</title>
</head>

<body class="bg-slate-600 font-serif">
    <div class="todoDiv flex justify-center mt-36 h-screen">
        <div class="bg-gray-300 h-[20rem] w-[24rem] rounded-xl">
            <div>
                <h1 class=" text-2xl font-bold pl-8 pt-4 text-blue-800 font-serif">To-Do List</h1>
            </div>
            <div class=" rounded-2xl flex flex-row ml-8 mt-4 h-10 w-full">
                <input id="inputBox" type="text" placeholder="Add your task" class="w-[68%] rounded-l-full pl-5
                 font-semibold outline-none focus:border-orange-400 border-2 focus:text-blue-800
                  focus:bg-slate-200 placeholder:text-orange-400">
                <button id="addButton" class="bg-orange-400 font-bold text-white rounded-full pl-4 pr-4 
                ml-[-19px] ">Add</button>
            </div>
            <div id="task-div">
                <ul id="listContainer" class="mt-4 ml-4 text-indigo-900 font-semibold w-[85%]">
                </ul>
            </div>
        </div>
    </div>
    <!-- <script src="script.js"></script> -->
    <script src="practice_script.js"></script>
</body>

</html>
