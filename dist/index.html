<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-500 grid place-content-center h-screen">
    <!--place-content-center makes the to come in the center(horizontally and vertically but with respect to the text body only. to make the text comes exactly in the center of the screen, we use "h-screen" which means take the screen as a whole body and then make the content to look exactly in the center of the screen)-->
    <h1 class="text-yellow-400 text-4xl font-bold m-6"> Testing Tailwind </h1>

    <div class="">

        <div class="p-6 max-w-sm mx-auto bg-white rounded-xl shadow-2xl flex items-center space-x-4">
            <!--Outer div which will contain the image or logo and the text. p-6 means padding of 6 * 0.25rem = 1.5 rem (24 pixel), max-w-sm means that the max width we be sm(24rem) which means 384 pixel, mx-auto means from both side the margin is set to auto -->
            <div>
                <img class="h-14 w-14"
                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Physics_wallah_logo.jpg/500px-Physics_wallah_logo.jpg"
                    alt="">
            </div>

            <div>
                <div class="text-xl font-medium text-black">
                    Tailwind CSS
                    <p class="text-slate-600 text-xl">By Hitesh Choudhary</p>
                </div>
            </div>
        </div>

    </div>

    <button class="bg-sky-600 mt-2 text-white text-base p-2 rounded-lg hover:bg-white
     hover:text-black text"> Buy Now </button>

    <div class="text-center my-4">
        <p class="text-white sm:text-red-500 md:text-blue-700">Lorem, ipsum .</p>
        <!-- Since Tailwind CSS follows mobile first approach, thatswhy on smaller screen text color is white but when it encounters smaller and bigger than medium screen, the text becomes red and when it encounters medium screen, the text color becomes blue -->
    </div>

    <div class="mt-3 max-w-sm bg-white rounded-xl overflow-hidden md:max-w-lg">
        <div class="md:flex">
            <div>
                <img class="h-48 w-full object-cover md:h-full md:w-48"
                    src="https://images.pexels.com/photos/2522657/pexels-photo-2522657.jpeg" alt="">
            </div>
            <div class="p-8">
                <div class="uppercase tracking-wide text-sm text-indigo-600 font-semibold ">An awesome card</div>
                <a class="block mt-1 text-lg font-medium text-black hover:text-blue-700" href="#">
                    Tailwind is amazing once you understand the <span
                        class="bg-yellow-500 p-[2px] px-[12px]">power</span>
                    of it</a>
                <p class="mt-2 text-slate-700">Lorem ipsum dolor sit amet consectetur .</p>
            </div>
        </div>
    </div>

</body>

</html>
